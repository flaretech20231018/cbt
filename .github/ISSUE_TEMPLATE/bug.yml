name: バグ報告
description: 不具合の報告
labels: ["type: fix"]
body:
  - type: textarea
    id: description
    attributes:
      label: バグの内容
      description: 何が起きましたか？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現する手順を記載してください
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動くべきですか？
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 環境
      description: ブラウザ・OS などの情報
    validations:
      required: false
