services:
  cbt:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - .:/cbt
      - /cbt/node_modules  # bind mount から切り離して node 権限の無名ボリュームで管理
      - /cbt/.next         # コンテナ（Linux）のバイナリを含むビルド成果物をホスト OS と分離
    environment:
      - NODE_ENV=development
    command: sleep infinity
