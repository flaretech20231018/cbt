services:
  cbt:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - .:/cbt
      - /cbt/node_modules
      - /cbt/.next
    environment:
      - NODE_ENV=development
